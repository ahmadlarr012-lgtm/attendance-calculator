<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="joke-style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <div class="header">
                <h1>😂 Random Joke Generator</h1>
                <p class="subtitle">Laugh out loud with random jokes!</p>
            </div>

            <div class="joke-display">
                <div class="joke-content" id="jokeContent">
                    <p class="loading">Loading a joke for you...</p>
                </div>
                <div class="joke-type" id="jokeType"></div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="newJokeBtn" onclick="getNewJoke()">
                    <span class="btn-icon">🎭</span> Get New Joke
                </button>
                <button class="btn btn-secondary" id="copyBtn" onclick="copyJoke()" style="display: none;">
                    <span class="btn-icon">📋</span> Copy Joke
                </button>
                <button class="btn btn-info" id="shareBtn" onclick="shareJoke()" style="display: none;">
                    <span class="btn-icon">🔗</span> Share
                </button>
            </div>

            <div class="filter-section">
                <h3>Filter by Type:</h3>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setFilter('all')">All</button>
                    <button class="filter-btn" onclick="setFilter('general')">General</button>
                    <button class="filter-btn" onclick="setFilter('programming')">Programming</button>
                    <button class="filter-btn" onclick="setFilter('knock-knock')">Knock-Knock</button>
                </div>
            </div>

            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Jokes Loaded:</span>
                    <span class="stat-value" id="jokesCount">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">API Status:</span>
                    <span class="stat-value status-good" id="apiStatus">✓ Online</span>
                </div>
            </div>

            <div class="history-section">
                <h3>Recent Jokes <span id="historyCount">(0)</span></h3>
                <div class="history-list" id="historyList">
                    <p class="empty-message">No jokes yet. Generate one to get started!</p>
                </div>
                <button class="btn btn-danger btn-small" id="clearHistoryBtn" onclick="clearHistory()" style="display: none;">
                    Clear History
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="joke-app.js"></script>
</body>
</html>
